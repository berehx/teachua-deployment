name: Build, Scan and Deploy

on:
  push:
    branches: [ "main", "feat/splunk-logging", "feat/security-scanning" ]

jobs:
  build-scan-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Run Snyk to check for vulnerabilities
        uses: snyk/actions/maven@master
        continue-on-error: true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --severity-threshold=high

      - name: Build Backend Image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          load: true
          tags: bereh/teachua-backend:scan

      - name: Build Frontend Image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          load: true
          tags: bereh/teachua-frontend:scan

      - name: Run Trivy scanner (Backend)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'bereh/teachua-backend:scan'
          format: 'table'
          exit-code: '0'
          severity: 'CRITICAL'

      - name: Run Trivy scanner (Frontend)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'bereh/teachua-frontend:scan'
          format: 'table'
          exit-code: '0'
          severity: 'CRITICAL'

      - name: Login to Docker Hub
        uses: docker/docker-login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Push Final Images
        run: |
          docker tag bereh/teachua-backend:scan bereh/teachua-backend:latest
          docker tag bereh/teachua-frontend:scan bereh/teachua-frontend:latest
          docker push bereh/teachua-backend:latest
          docker push bereh/teachua-frontend:latest

  deploy:
    runs-on: ubuntu-latest
    needs: build-scan-push
    steps:
      - name: Deploy to Azure via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.AZURE_VM_IP }}
          username: azureuser
          key: ${{ secrets.AZURE_VM_SSH_KEY }}
          script: |
            cd /home/azureuser/teachua-deployment
            git fetch origin ${{ github.ref_name }}
            git reset --hard origin/${{ github.ref_name }}
            echo "DB_PASSWORD=${{ secrets.DB_PASSWORD }}" > .env
            echo "DB_ROOT_PASSWORD=root_password" >> .env
            echo "SPLUNK_TOKEN=${{ secrets.SPLUNK_TOKEN }}" >> .env
            echo "SPLUNK_URL=${{ secrets.SPLUNK_URL }}" >> .env
            echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin
            docker compose pull
            docker compose up -d --force-recreate
