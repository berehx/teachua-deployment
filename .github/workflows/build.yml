name: Build, Scan and Deploy

on:
  push:
    branches:
      - main

jobs:
  build-scan-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/docker-login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
        
      - name: Set outputs
        id: vars
        run: echo "sha_short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT
        
      - name: Build and push Backend
        uses: docker/build-push-action@v5
        with:
          context: ./teachua-backend-berehx
          push: true
          platforms: linux/amd64
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/teachua-backend:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/teachua-backend:${{ steps.vars.outputs.sha_short }}
          
      - name: Build and push Frontend
        uses: docker/build-push-action@v5 
        with:
          context: ./teachua-frontend-berehx
          push: true
          platforms: linux/amd64
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/teachua-frontend:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/teachua-frontend:${{ steps.vars.outputs.sha_short }}

  deploy:
    runs-on: ubuntu-latest
    needs: build-scan-push
    steps:
      - name: Deploy to Azure via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:   
          host: ${{ secrets.AZURE_VM_IP }}
          username: azureuser
          key: ${{ secrets.AZURE_VM_SSH_KEY }}
          script: |
            cd /home/azureuser/teachua-deployment
            sudo mv db_data /home/azureuser/db_data_safe || true
            sudo rm -rf nginx.conf || true
            sudo git fetch origin main
            sudo git reset --hard origin/main
            sudo rm -rf db_data
            sudo mv /home/azureuser/db_data_safe db_data || true
            sudo chown -R azureuser:azureuser /home/azureuser/teachua-deployment
            
            echo "DB_PASSWORD=${{ secrets.DB_PASSWORD }}" > .env
            echo "DB_ROOT_PASSWORD=${{ secrets.DB_ROOT_PASSWORD }}" >> .env
            echo "SPLUNK_TOKEN=${{ secrets.SPLUNK_TOKEN }}" >> .env
            echo "SPLUNK_URL=${{ secrets.SPLUNK_URL }}" >> .env
            echo "HOST=0.0.0.0" >> .env

            cat <<EOF > nginx.conf
            server {
                listen 80;
                location / {
                    proxy_pass http://frontend:3000;
                    proxy_set_header Host \$host;
                    proxy_set_header X-Real-IP \$remote_addr;
                }
                location /dev {
                    proxy_pass http://backend:8080;
                }
            }
            EOF

            echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin
            docker compose pull 
            docker compose up -d --force-recreate
