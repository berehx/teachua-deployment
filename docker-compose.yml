version: '3.8'

services:
  db:
    image: mariadb:10.6
    container_name: teachua-db
    restart: always
    environment:
      MYSQL_DATABASE: teachua
      MYSQL_PASSWORD: ${DB_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - teachua-network

  backend:
    image: ${DOCKERHUB_USERNAME}/teachua-backend:${IMAGE_TAG:-latest}
    container_name: teachua-backend
    restart: always
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mariadb://db:3306/teachua
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=${DB_ROOT_PASSWORD}
      - SPRING_DATASOURCE_DRIVER_CLASS_NAME=org.mariadb.jdbc.Driver
      - SPRING_JPA_DATABASE_PLATFORM=org.hibernate.dialect.MariaDB106Dialect
      - OTEL_OTLP_ENDPOINT=http://otel-collector:4317
      - OTEL_SERVICE_NAME=teachua-backend
    depends_on:
      - db
      - otel-collector
    networks:
      - teachua-network

  frontend:
    image: ${DOCKERHUB_USERNAME}/teachua-frontend:${IMAGE_TAG:-latest}
    container_name: teachua-frontend
    restart: always
    environment:
      - NODE_OPTIONS="" # Оце вилікує твій фронтенд
    networks:
      - teachua-network

  nginx:
    image: nginx:latest
    container_name: teachua-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - backend
    networks:
      - teachua-network

  otel-collector:
    image: otel/opentelemetry-collector-contrib:latest
    container_name: otel-collector
    restart: always
    command: ["--config=/etc/otel-config.yaml"]
    volumes:
      - ./otel-config.yaml:/etc/otel-config.yaml
    networks:
      - teachua-network

  jaeger:
    image: jaegertracing/all-in-one:latest
    container_name: jaeger
    ports:
      - "16686:16686"
    networks:
      - teachua-network

networks:
  teachua-network:
    driver: bridge

volumes:
  db_data:
