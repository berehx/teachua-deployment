version: '3.8'

services:
  db:
    image: mariadb:10.6
    container_name: teachua-db
    restart: always
    environment:
      MYSQL_DATABASE: teachua
      MYSQL_PASSWORD: ${DB_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - teachua-network

  backend:
    image: bereh/teachua-backend:latest
    ports:
      - "8080:8080"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mariadb://db:3306/teachua
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=${DB_ROOT_PASSWORD}
      - SPRING_DATASOURCE_DRIVER_CLASS_NAME=org.mariadb.jdbc.Driver
      - SPRING_JPA_DATABASE_PLATFORM=org.hibernate.dialect.MariaDB106Dialect
      - OTEL_OTLP_ENDPOINT=http://otel-collector:4317
      - OTEL_SERVICE_NAME=teachua-backend
    depends_on:
      - db
    networks:
      - teachua-network

  frontend:
    image: bereh/teachua-frontend:latest
    entrypoint: ["npm", "start"]
    ports:
      - "3000:3000"
    environment:
      - ROOT_SERVER=http://backend:8080/dev
      - HOST=0.0.0.0
    depends_on:
      - backend
    networks:
      - teachua-network

  nginx:
    image: nginx:latest
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - backend
    logging:
      driver: splunk
      options:
        splunk-token: "${SPLUNK_TOKEN}"
        splunk-url: "${SPLUNK_URL}"
        splunk-insecureskipverify: "true"
        tag: "{{.Name}}/{{.ID}}"
    networks:
      - teachua-network

networks:
  teachua-network:
    driver: bridge

volumes:
  db_data:
